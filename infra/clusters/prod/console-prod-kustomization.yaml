apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: console-prod
  namespace: flux-system
spec:
  interval: 5m0s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: platform-config
  path: ./infra/apps/core/console/prod
  dependsOn:
    - name: platform-k3s
    - name: infrastructure-stack
