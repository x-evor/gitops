apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: accounts-env
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-platform
  target:
    name: accounts-env
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: core/pre/accounts

