nameOverride: console
containerPort: 3000
service:
  port: 80
existingSecretName: console-env
env:
  PORT: "3000"
  SERVICE_NAME: console
  HEALTHCHECK_PATH: /healthz
readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 30
  periodSeconds: 20

