apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: vault
  namespace: extsvc
spec:
  interval: 10m0s
  chart:
    spec:
      chart: vault
      version: ">=0.28.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    injector:
      enabled: false
    server:
      standalone:
        enabled: false
      dataStorage:
        enabled: true
        size: 8Gi
      ha:
        enabled: true
        replicas: 1
        raft:
          enabled: true
          setNodeId: true
      service:
        enabled: true

