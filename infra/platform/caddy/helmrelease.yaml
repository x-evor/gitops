apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: caddy
  namespace: platform
spec:
  interval: 10m0s
  chart:
    spec:
      chart: caddy-ingress-controller
      version: ">=1.0.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: caddy-ingress
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    ingressController:
      enabled: true
    ingressClass:
      create: true
      name: caddy
      default: false
    service:
      type: LoadBalancer

