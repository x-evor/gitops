apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: platform
spec:
  interval: 10m0s
  chart:
    spec:
      chart: external-dns
      version: ">=1.14.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    provider: cloudflare
    policy: sync
    registry: txt
    txtOwnerId: svc-plus-k3s
    sources:
      - ingress
    domainFilters:
      - svc.plus
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-token
            key: api-token
