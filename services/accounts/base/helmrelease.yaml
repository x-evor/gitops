apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: accounts
spec:
  interval: 5m0s
  releaseName: accounts
  chartRef:
    kind: OCIRepository
    name: accounts-chart
  valuesFrom:
    - kind: ConfigMap
      name: accounts-base-values
      valuesKey: values.yaml
    - kind: ConfigMap
      name: accounts-env-values
      valuesKey: values.yaml
