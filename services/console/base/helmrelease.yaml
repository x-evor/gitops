apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: console
spec:
  interval: 5m0s
  releaseName: console
  chartRef:
    kind: OCIRepository
    name: console-chart
  valuesFrom:
    - kind: ConfigMap
      name: console-base-values
      valuesKey: values.yaml
    - kind: ConfigMap
      name: console-env-values
      valuesKey: values.yaml
