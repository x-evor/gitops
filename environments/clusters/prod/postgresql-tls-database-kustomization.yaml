apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postgresql-tls-database
  namespace: flux-system
spec:
  interval: 5m0s
  prune: true
  wait: true
  timeout: 10m0s
  sourceRef:
    kind: GitRepository
    name: platform-config
  path: ./services/database/postgresql-tls
  dependsOn:
    - name: cert-manager-issuer
