apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: stunnel-server
  namespace: flux-system
spec:
  interval: 5m0s
  prune: true
  wait: true
  timeout: 10m0s
  sourceRef:
    kind: GitRepository
    name: platform-config
  path: ./services/database/stunnel-server
  dependsOn:
    - name: postgresql-prod
