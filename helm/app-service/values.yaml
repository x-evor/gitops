nameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/example/app
  tag: latest
  pullPolicy: IfNotPresent

containerPort: 8080

service:
  port: 80
  type: ClusterIP

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

podLabels: {}
podAnnotations: {}

env: {}
existingSecretName: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 30
  periodSeconds: 20

pdb:
  enabled: true
  minAvailable: 1

reloader:
  enabled: true
  secretMatch: ""

