apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: accounts
  annotations:
    external-dns.alpha.kubernetes.io/hostname: accounts.svc.plus
spec:
  ingressClassName: caddy
  tls:
    - hosts:
        - accounts.svc.plus
      secretName: accounts-prod-tls
  rules:
    - host: accounts.svc.plus
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: accounts
                port:
                  number: 80

