service:
  replicaCount: 2
  global:
    imagePullPolicy: IfNotPresent
    # Production consumes an explicitly published release tag or version.
    tag: release
    env:
      APP_ENV: production
      DB_SCHEMA: core_prod
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 768Mi
  pdb:
    minAvailable: 1
