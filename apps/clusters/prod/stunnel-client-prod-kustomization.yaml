apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: stunnel-client-prod
  namespace: flux-system
spec:
  interval: 5m0s
  prune: true
  wait: true
  timeout: 10m0s
